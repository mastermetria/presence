{% extends 'base.html' %}

{% block head %}
<title>Document</title>
<link rel="stylesheet" href="/static/css/a2/main.css">
{% endblock %}

{% block body %}
<div class="container">
    <header>
        <a href="/" style="text-decoration: none"><h3 class="main-title">Retour à la page principale</h3></a>
    </header>

    <section class="file-list">
        <h2 class="list-title">Liste des fichiers</h2>
        <ul>
            {% for file in excel_list %}
            <li class="file-item">
                <span>{{ loop.index }}</span>
                <span>{{ file }}</span>
            </li>
            {% endfor %}
        </ul>
    </section>
    <a href="/a2/download" class="btn-download">Télécharger le dossier</a>
    </div>

{% endblock %}
